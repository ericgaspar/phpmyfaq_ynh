#:schema https://raw.githubusercontent.com/YunoHost/apps/main/schemas/manifest.v2.schema.json

packaging_format = 2

id = "phpmyfaq"
name = "phpMyFAQ"
description.en = "Explain in *a few (10~15) words* the purpose of the app or what it actually does (it is meant to give a rough idea to users browsing a catalog of 100+ apps)"
description.fr = "Expliquez en *quelques* (10~15) mots l'utilité de l'app ou ce qu'elle fait (l'objectif est de donner une idée grossière pour des utilisateurs qui naviguent dans un catalogue de 100+ apps)"

version = "4.1.3~ynh1"

maintainers = ["eric_G"]

[upstream]
license = "MPL-2.0"
website = "https://www.phpmyfaq.de/"
demo = "https://demo.example.com"
admindoc = "https://doc.yunohost.org/dev/packaging/"
userdoc = "https://yunohost.org/apps"
code = "https://github.com/thorsten/phpMyFAQ"

[integration]
yunohost = ">= 12.1.39"
helpers_version = "2.1"
architectures = "all"
multi_instance = true

ldap = false
sso = false

disk = "50M"
ram.build = "50M"
ram.runtime = "50M"

[install]
    [install.domain]
    type = "domain"

    [install.path]
    type = "path"
    default = "/phpmyfaq"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

[resources]

    [resources.sources]

    [resources.sources.main]
    url = "https://download.phpmyfaq.de/phpMyFAQ-4.1.3.tar.gz"
    sha256 = "0a25935a4a40923ab86cb50a6b68c5c65beaef3aacdd80242e8da567ff8ab92f"

    # autoupdate.strategy = "latest_github_tag"

    [resources.system_user]

    [resources.install_dir]

    [resources.data_dir]

    [resources.permissions]
    main.url = "/"

    [resources.ports]

    [resources.apt]
    packages = "mariadb-server, php8.5-pdo, php8.5-gd, php8.5-curl, php8.5-mbstring, php8.5-pdozip, php8.5-xml"

    [resources.database]
    type = "mysql"

    [resources.nodejs]
    version = "24"
